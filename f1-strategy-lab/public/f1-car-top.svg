<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" fill="none">
  <!-- F1 Car Top-Down Silhouette — nose points RIGHT -->
  <!-- Schematic / blueprint style with transparent background -->

  <!-- REAR WING -->
  <rect x="28" y="28" width="8" height="204" rx="3" fill="#c0c0c0" opacity="0.9"/>
  <rect x="36" y="36" width="4" height="188" rx="2" fill="#e10600" opacity="0.8"/>

  <!-- REAR WING ENDPLATES -->
  <rect x="22" y="22" width="20" height="18" rx="3" fill="#888"/>
  <rect x="22" y="220" width="20" height="18" rx="3" fill="#888"/>

  <!-- REAR TYRES -->
  <ellipse cx="60" cy="22" rx="32" ry="18" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <ellipse cx="60" cy="22" rx="22" ry="10" fill="#111" stroke="#333" stroke-width="1"/>
  <ellipse cx="60" cy="238" rx="32" ry="18" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <ellipse cx="60" cy="238" rx="22" ry="10" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- REAR SUSPENSION ARMS -->
  <line x1="60" y1="36" x2="80" y2="68" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="36" x2="95" y2="58" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="224" x2="80" y2="192" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="224" x2="95" y2="202" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ENGINE COVER / REAR BODY -->
  <path d="
    M 80,68
    L 80,192
    C 80,200 90,205 100,205
    L 140,200
    L 140,60
    L 100,55
    C 90,55 80,60 80,68
    Z
  " fill="#1e1e30" stroke="#e10600" stroke-width="1.5"/>

  <!-- DIFFUSER ACCENT -->
  <path d="M 42,80 L 78,75" stroke="#e10600" stroke-width="1" opacity="0.6"/>
  <path d="M 42,180 L 78,185" stroke="#e10600" stroke-width="1" opacity="0.6"/>

  <!-- SIDEPODS -->
  <path d="
    M 140,55
    L 200,48
    C 220,46 235,50 240,60
    L 245,75
    L 245,185
    L 240,200
    C 235,210 220,214 200,212
    L 140,205
    Z
  " fill="#222240" stroke="#e10600" stroke-width="1.2" opacity="0.95"/>

  <!-- SIDEPOD INLETS -->
  <rect x="145" y="55" width="40" height="8" rx="3" fill="#111" stroke="#555" stroke-width="0.8"/>
  <rect x="145" y="197" width="40" height="8" rx="3" fill="#111" stroke="#555" stroke-width="0.8"/>

  <!-- MONOCOQUE / MAIN BODY -->
  <path d="
    M 140,60
    L 350,52
    C 380,50 410,48 440,48
    L 480,50
    C 500,52 515,58 525,70
    L 540,100
    L 545,130
    L 545,130
    L 540,160
    L 525,190
    C 515,202 500,208 480,210
    L 440,212
    C 410,212 380,210 350,208
    L 140,200
    Z
  " fill="#1a1a2e" stroke="#e10600" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- NOSE CONE TIP -->
  <path d="
    M 545,130
    L 568,130
    L 568,130
    L 545,130
  " stroke="#e10600" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="565" cy="130" rx="8" ry="5" fill="#1a1a2e" stroke="#e10600" stroke-width="1.5"/>

  <!-- COCKPIT OPENING -->
  <ellipse cx="320" cy="130" rx="38" ry="22" fill="#0a0a18" stroke="#e10600" stroke-width="1"/>

  <!-- HALO -->
  <path d="M 295,118 Q 320,105 345,118" fill="none" stroke="#888" stroke-width="4" stroke-linecap="round"/>
  <path d="M 295,118 L 295,130" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <path d="M 345,118 L 345,130" stroke="#888" stroke-width="3" stroke-linecap="round"/>

  <!-- DRIVER HELMET (inside cockpit) -->
  <ellipse cx="315" cy="128" rx="8" ry="7" fill="#e10600" opacity="0.7"/>
  <ellipse cx="315" cy="126" rx="5" ry="3" fill="#222" opacity="0.6"/>

  <!-- AIRBOX (above driver) -->
  <rect x="330" y="120" width="20" height="20" rx="6" fill="#111128" stroke="#555" stroke-width="0.8"/>

  <!-- ENGINE COVER CENTER LINE -->
  <line x1="140" y1="130" x2="300" y2="130" stroke="#333" stroke-width="0.8" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- FRONT SUSPENSION ARMS -->
  <line x1="470" y1="36" x2="460" y2="62" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="470" y1="36" x2="440" y2="56" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="470" y1="224" x2="460" y2="198" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="470" y1="224" x2="440" y2="204" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

  <!-- FRONT TYRES -->
  <ellipse cx="470" cy="22" rx="32" ry="18" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <ellipse cx="470" cy="22" rx="22" ry="10" fill="#111" stroke="#333" stroke-width="1"/>
  <ellipse cx="470" cy="238" rx="32" ry="18" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <ellipse cx="470" cy="238" rx="22" ry="10" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- FRONT WING MAIN PLANE -->
  <rect x="490" y="12" width="6" height="96" rx="2" fill="#e10600" opacity="0.9"/>
  <rect x="490" y="152" width="6" height="96" rx="2" fill="#e10600" opacity="0.9"/>

  <!-- FRONT WING CASCADE ELEMENTS -->
  <rect x="498" y="18" width="4" height="84" rx="1.5" fill="#c00" opacity="0.7"/>
  <rect x="498" y="158" width="4" height="84" rx="1.5" fill="#c00" opacity="0.7"/>
  <rect x="504" y="24" width="3" height="72" rx="1" fill="#900" opacity="0.5"/>
  <rect x="504" y="164" width="3" height="72" rx="1" fill="#900" opacity="0.5"/>

  <!-- FRONT WING ENDPLATES -->
  <rect x="486" y="6" width="24" height="14" rx="3" fill="#888"/>
  <rect x="486" y="240" width="24" height="14" rx="3" fill="#888"/>

  <!-- FRONT WING NOSE CONNECTION -->
  <line x1="492" y1="60" x2="545" y2="125" stroke="#555" stroke-width="2"/>
  <line x1="492" y1="200" x2="545" y2="135" stroke="#555" stroke-width="2"/>

  <!-- FLOOR EDGE DETAIL (visible ground effect edge) -->
  <path d="M 100,62 L 420,50" stroke="#00d2ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="8 4"/>
  <path d="M 100,198 L 420,210" stroke="#00d2ff" stroke-width="0.8" opacity="0.3" stroke-dasharray="8 4"/>

  <!-- T-TRAY / PLANK LINE -->
  <line x1="100" y1="130" x2="540" y2="130" stroke="#f5c518" stroke-width="0.6" opacity="0.2" stroke-dasharray="3 6"/>
</svg>
